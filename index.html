<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر لقناة الرياضية - 3</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body {
            /* 1. تعديل الخلفية: تدرج لوني من الصورة الأصلية (أرجواني داكن إلى وردي فوشيا) */
            background: linear-gradient(to right, #4b2c64, #f83a7f);
            margin: 0;
            padding: 0;
            color: white; /* لجعل النص مقروءاً على الخلفية الملونة */
            /* 2. التمركز في منتصف الصفحة: استخدام Flexbox للتمركز العمودي والأفقي */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .page-container {
            /* حاوية داخلية إضافية للتحكم الأفضل في التخطيط */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; /* مسافة بين العنوان والفيديو */
        }
        h2 {
            font-size: 2.2em; /* تكبير العنوان قليلاً */
            margin: 0;
        }
        .video-container {
            /* 3. تكبير الفيديو قليلاً: زيادة max-width ليكون أوسع */
            max-width: 1000px; /* كان 800 بكسل */
            width: 100%;
            margin: 0 auto;
            direction: rtl;
        }
        .video-js {
            /* 4. تكبير الفيديو قليلاً: زيادة الارتفاع */
            width: 200% !important;
            height: 600px !important; /* كان 450 بكسل */
        }
    </style>
</head>
<body>

<div class="page-container">
    <h2>بث مباشر: قناة الرياضية المغربية (Arryadia)</h2>
    
    <div class="video-container">
        <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" poster="https://arryadia.snrt.ma/images/logo_arryadia.png">
            <source src="https://stream-lb.livemediama.com/arryadia/hls/master.m3u8" type="application/x-mpegURL">
            <p class="vjs-no-js">
                للمشاهدة، يرجى تفعيل جافا سكريبت وتحديث المتصفح.
            </p>
        </video>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script src="ad-manager.js"></script>
<script>
    var player = videojs('my-video');
    player.play(); // محاولة التشغيل التلقائي (قد تمنعها بعض المتصفحات)
</script>

</body>
</html>
